<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RT Personalization 2.0</title>
  <style>
    html * {
      margin: 0;
      padding: 0;
    }

    .container {
      display: flex;
      padding: 3px;
    }
    .config {
      flex: 1;
    }
    .engage {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .inline-btn {
      margin-top: 30px;
    }

    .field {
      display: flex;
      align-items: center;
      padding: 5px;
      gap: 5px;
    }

    input[type=text] {
      padding: 3px 8px;
    }

    input[type=text]#token,
    input[type=text]#apikey {
      width: 250px;
    }

    .field label:first-child {
      display: block;
      width: 150px;
    }

    .field.buttons .first {
      margin-right: 30px;
      background-color: blue;
      color: white;
      width: 80px;
    }

    .inline-msg {
      padding: 15px;
      background-color: green;
      color: white;
      margin-bottom: 5px;
    }

    textarea#display {
      height: 250px;
      width: 90%;
    }

    textarea#payload {
      height: 100px;
      width: 300px;
    }
  </style>
<script type="text/javascript">
!function(t,e){if(void 0===e[t]){e[t]=function(){e[t].clients.push(this),this._init=[Array.prototype.slice.call(arguments)]},e[t].clients=[];for(var r=function(t){return function(){return this["_"+t]=this["_"+t]||[],this["_"+t].push(Array.prototype.slice.call(arguments)),this}},s=["set","collectTags","blockEvents","unblockEvents","setSignedMode","setAnonymousMode","fetchServerCookie","fetchGlobalID","fetchUserSegments","fetchPersonalization","resetUUID","addRecord","trackEvent","trackPageview","trackClicks","ready"],c=0;c<s.length;c++){var o=s[c];e[t].prototype[o]=r(o)}var n=document.createElement("script");n.type="text/javascript",n.async=!0,n.src=("https:"===document.location.protocol?"https:":"http:")+"//imnutzs3.s3.us-east-1.amazonaws.com/td-sdk.js";var i=document.getElementsByTagName("script")[0];i.parentNode.insertBefore(n,i)}}("Treasure",this);

  <script>
    var td = new Treasure({
      database: 'xxxxxxxxxx',
      writeKey: 'xxxxxxxxxx',
      host: 'xxxxxxxxxx'
    });
  </script>
  <script src="rt_p13n.js" type="text/javascript" defer></script>
</head>
<body>
  <div class="inline-msg" id="inline_message"></div>
  <div class="container">
    <div class="config">
      <h1>RT P13N</h1> 
      <div class="field">
        <label for="host">Host: </label>
        <select name="host" id="host">
          <option value="p13n-api-development.treasuredata.com">p13n-api-development.treasuredata.com</option>
          <option value="us01.p13n.in.treasuredata.com">us01.p13n.in.treasuredata.com</option>
          <option value="eu01.p13n.in.treasuredata.com">eu01.p13n.in.treasuredata.com</option>
        </select>
      </div>

      <div class="field">
        <label for="apikey">API Key: </label>
        <input type="text" name="apikey" id="apikey">
      </div>


      <div class="field">
        <label for="token">P13n token: </label>
        <input type="text" name="token" id="token">
      </div>

      <div class="field">
        <label for="db">Database: </label>
        <input type="text" name="db" id="db" value="engage_in_app_message">
        <label for="tb">Table: </label>
        <input type="text" name="tb" id="tb" value="be_users">
      </div>
      <div class="field">
        <label for="payload">Payload(JSON): </label>
        <textarea name="payload" id="payload"></textarea>
      </div>
      <div class="field buttons">
        <button id="request" class="first">Request</button>
        <button id="add_to_cart">Add to cart</button>
        <button id="bn_btn">Buy now</button>
        <button id="add_to_wishlist">Add to wishlist</button>
        <button id="subscribe">Subscribe</button>
      </div>
      <hr/>
    </div>
    <div class="engage">
      <h3>Update payload</h3>
      <button id="o_1_inline">1offer/inline x 1</button>
      <button id="o_1_in_1_pop">1 offer / inline + popup (mixed)</button>
      <button id="o_2_pop">1 offer / popup × 2</button>
      <button id="o_2_in">1 offer / inline × 2</button>
      <button id="o_5">Most Complex Sample (5 offers)</button>

      <button class="inline-btn" id="add_inline_msg">Add Inline Message field</button>
    </div>
  </div>
  <div>
    <textarea id="display"></textarea>
  </div>
</body>
</html>
